<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Note Management - Login</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="assets/Css/Style.css">
</head>
<body>

    <div class="auth-card">
        <div id="authAlert" class="alert d-none mb-3" role="alert"></div>

        <div id="login-form">
            <h3 class="text-center mb-4">Đăng Nhập</h3>
            <form id="loginForm">
                <div class="mb-3">
                    <label for="loginEmail" class="form-label">Email address</label>
                    <input type="email" class="form-control" id="loginEmail" name="email" required>
                </div>
                <div class="mb-3">
                    <label for="loginPassword" class="form-label">Password</label>
                    <input type="password" class="form-control" id="loginPassword" name="password" required>
                </div>
                <div class="d-flex justify-content-between mb-3">
                    <a href="#" class="text-decoration-none text-muted small">Quên mật khẩu?</a>
                </div>
                <button type="submit" class="btn btn-primary w-100" id="loginSubmitBtn">Đăng Nhập</button>
                <div class="text-center mt-3">
                    <span class="text-muted small">Chưa có tài khoản?</span> 
                    <a href="#" id="show-register" class="text-decoration-none small">Đăng ký ngay</a>
                </div>
            </form>
        </div>

        <div id="register-form">
            <h3 class="text-center mb-4">Đăng Ký</h3>
            <form id="registerForm">
                <div class="mb-3">
                    <label for="regEmail" class="form-label">Email address</label>
                    <input type="email" class="form-control" id="regEmail" name="email" required>
                </div>
                <div class="mb-3">
                    <label for="regName" class="form-label">Display Name</label>
                    <input type="text" class="form-control" id="regName" name="display_name" required>
                </div>
                <div class="mb-3">
                    <label for="regPassword" class="form-label">Password</label>
                    <input type="password" class="form-control" id="regPassword" name="password" required>
                </div>
                <div class="mb-3">
                    <label for="regPasswordConfirm" class="form-label">Confirm Password</label>
                    <input type="password" class="form-control" id="regPasswordConfirm" name="confirm_password" required>
                </div>
                <button type="submit" class="btn btn-success w-100" id="registerSubmitBtn">Đăng Ký</button>
                <div class="text-center mt-3">
                    <span class="text-muted small">Đã có tài khoản?</span> 
                    <a href="#" id="show-login" class="text-decoration-none small">Đăng nhập</a>
                </div>
            </form>
        </div>
    </div>

    <script src="assets/Script/script.js"></script>
</body>
</html>
