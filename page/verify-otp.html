<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Xác thực OTP</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="../assets/Css/Style.css">
</head>
<body>
    <div class="auth-card">
        <div id="otpAlert" class="alert d-none mb-3" role="alert"></div>
        <h3 class="text-center mb-3">Xác thực OTP</h3>
        <p class="text-muted text-center small mb-4">Nhập mã OTP <strong>456789</strong> để tiếp tục đặt lại mật khẩu.</p>

        <form id="verifyOtpForm">
            <div class="mb-3">
                <label for="otpCode" class="form-label">Mã OTP</label>
                <input type="text" class="form-control" id="otpCode" maxlength="6" required>
            </div>
            <button type="submit" class="btn btn-primary w-100" id="otpSubmitBtn">Xác nhận OTP</button>
            <div class="text-center mt-3">
                <button type="button" id="cancelOtpBtn" class="btn btn-link text-decoration-none small p-0">Quay lại đăng nhập</button>
            </div>
        </form>
    </div>

    <script src="../assets/Script/verify-otp.js"></script>
</body>
</html>
