<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Quên mật khẩu</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="../assets/Css/Style.css">
</head>
<body>
    <div class="auth-card">
        <div id="forgotAlert" class="alert d-none mb-3" role="alert"></div>
        <h3 class="text-center mb-3">Quên mật khẩu</h3>
        <p class="text-muted text-center small mb-4">Nhập email của bạn để nhận mã OTP giả lập.</p>

        <form id="forgotPasswordForm">
            <div class="mb-3">
                <label for="forgotEmail" class="form-label">Email address</label>
                <input type="email" class="form-control" id="forgotEmail" required>
            </div>
            <button type="submit" class="btn btn-primary w-100" id="forgotSubmitBtn">Gửi OTP</button>
            <div class="text-center mt-3">
                <a href="../index.html" class="text-decoration-none small">Quay lại đăng nhập</a>
            </div>
        </form>
    </div>

    <script src="../assets/Script/forgot-password.js"></script>
</body>
</html>
