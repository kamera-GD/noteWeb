<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Note Management - Dashboard</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="../assets/Css/dashboard.css">
</head>
<body>

    <nav class="navbar navbar-expand-lg navbar-light sticky-top mb-4">
        <div class="container-fluid px-4">
            <a class="navbar-brand fw-bold" href="#">MyNotes</a>
            <form class="d-flex mx-auto w-50">
                <input class="form-control me-2" type="search" id="searchInput" placeholder="Tìm kiếm ghi chú..." aria-label="Search"> 
            </form>
            <div class="d-flex align-items-center">
                <span class="me-3">Xin chào, <strong id="currentUserName">User</strong></span>
                <button class="btn btn-outline-danger btn-sm" id="btnLogout">Đăng xuất</button>
            </div>
        </div>
    </nav>

    <div class="container-fluid px-4">
        <div class="row">
            <div class="col-md-2 sidebar-container">
                <ul class="nav flex-column">
                    <li class="nav-item">
                        <!-- chưa xong -->
                        <a class="nav-link active text-dark fw-bold" href="#" id="allNotesLink"><i class="fa-regular fa-lightbulb me-2"></i> Tất cả Ghi chú</a>
                    </li>
                    <hr class="my-2">
                    <h6 class="sidebar-heading px-3 mt-3 mb-2 text-muted fw-bold" style="font-size: 0.8rem;">NHÃN CỦA TÔI</h6>
                    
                    <div id="sidebarLabelList"></div>

                    <li class="nav-item mt-2">
                        <a class="nav-link text-dark" href="#" id="btnOpenManageLabels">
                            <i class="fa-solid fa-pen me-2 text-secondary"></i> Chỉnh sửa nhãn
                        </a>
                    </li>
                </ul>
            </div>

            <div class="col-md-10">
                <div class="d-flex justify-content-between align-items-center mb-4">
                    <button class="btn btn-primary shadow-sm" id="btnAddNote">
                        <i class="fa-solid fa-plus me-1"></i> Tạo ghi chú mới
                    </button>
                    
                    <div class="btn-group" role="group">
                        <button type="button" class="btn btn-outline-secondary active" id="btnGrid"><i class="fa-solid fa-border-all"></i> Grid</button>
                        <button type="button" class="btn btn-outline-secondary" id="btnList"><i class="fa-solid fa-list"></i> List</button>
                    </div>
                </div>

                <div class="row" id="notes-container"></div>
                <div class="text-center text-muted py-4 d-none" id="emptyNotesMessage">Chưa có ghi chú nào.</div>
            </div>
        </div>
    </div>

    <div class="modal fade" id="noteModal" tabindex="-1" aria-hidden="true">
        <div class="modal-dialog modal-dialog-centered modal-lg">
            <div class="modal-content border-0 shadow-lg">
                <div class="modal-header border-0 pb-0">
                    <input type="text" id="noteTitle" class="form-control fs-4 fw-bold border-0 shadow-none" placeholder="Tiêu đề...">
                    <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
                </div>
                <div class="modal-body pt-2">
                    <textarea id="noteContent" class="form-control border-0 shadow-none" rows="10" placeholder="Nội dung ghi chú..."></textarea>
                    
                    <div class="mt-3 px-2" id="noteLabelsContainer">
                        <!-- Nhãn sẽ được thêm động tại đây -->
                    </div>

                    <div class="text-muted small mt-2 text-end" id="saveStatus"></div>
                </div>
                <div class="modal-footer border-0 d-flex justify-content-between pt-0">
                    <div>
                        <button class="btn btn-light btn-sm rounded-circle"><i class="fa-regular fa-image"></i></button>
                    </div>
                    <div>
                        <button type="button" class="btn btn-outline-dark btn-sm me-2" id="btnTogglePassword">Mật khẩu</button>
                        <button type="button" class="btn btn-outline-danger btn-sm d-none" id="btnDeleteInModal">Xóa</button>
                        <button type="button" class="btn btn-secondary btn-sm" data-bs-dismiss="modal">Đóng</button>
                    </div>
                </div>
                <input type="hidden" id="noteId" value="">
            </div>
        </div>
    </div>

    <div class="modal fade" id="deleteConfirmModal" tabindex="-1" aria-hidden="true">
        <div class="modal-dialog modal-dialog-centered modal-sm">
            <div class="modal-content border-0 shadow">
                <div class="modal-header bg-danger text-white border-0">
                    <h5 class="modal-title fs-6">Xác nhận xóa</h5>
                    <button type="button" class="btn-close btn-close-white" data-bs-dismiss="modal"></button>
                </div>
                <div class="modal-body text-center py-4">Bạn có chắc chắn muốn xóa?</div>
                <div class="modal-footer border-0 justify-content-center pt-0">
                    <button type="button" class="btn btn-light btn-sm" data-bs-dismiss="modal">Hủy</button>
                    <button type="button" class="btn btn-danger btn-sm" id="btnConfirmDelete">Xóa</button>
                </div>
            </div>
        </div>
    </div>

    <div class="modal fade" id="labelManageModal" tabindex="-1" aria-hidden="true">
        <div class="modal-dialog modal-dialog-centered modal-sm">
            <div class="modal-content border-0 shadow-lg">
                <div class="modal-header border-bottom">
                    <h5 class="modal-title fs-5 fw-bold">Chỉnh sửa nhãn</h5>
                    <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
                </div>
                <div class="modal-body p-0">
                    <div class="d-flex align-items-center border-bottom p-3">
                        <i class="fa-solid fa-plus text-muted me-3"></i>
                        <input type="text" class="form-control form-control-sm border-0 shadow-none p-0" id="newLabelInput" placeholder="Tạo nhãn mới">
                        <i class="fa-solid fa-check text-primary ms-2 cursor-pointer" id="btnCreateLabel" title="Tạo"></i>
                    </div>
                    <div id="editLabelList" class="p-2"></div>
                </div>
                <div class="modal-footer border-0">
                    <button type="button" class="btn btn-secondary btn-sm w-100" data-bs-dismiss="modal">Xong</button>
                </div>
            </div>
        </div>
    </div>

    <div class="modal fade" id="verifyNotePasswordModal" tabindex="-1" aria-hidden="true">
        <div class="modal-dialog modal-dialog-centered modal-sm">
            <div class="modal-content border-0 shadow-lg">
                <div class="modal-header border-bottom">
                    <h5 class="modal-title fs-6 fw-bold">Xác thực mật khẩu ghi chú</h5>
                    <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
                </div>
                <form id="verifyNotePasswordForm">
                    <div class="modal-body">
                        <p class="small text-muted mb-2">Ghi chú này đang được bảo vệ bằng mật khẩu.</p>
                        <input type="password" class="form-control" id="verifyNotePasswordInput" placeholder="Nhập mật khẩu" required>
                        <div class="small text-danger mt-2 d-none" id="verifyNotePasswordError"></div>
                    </div>
                    <div class="modal-footer border-0">
                        <button type="button" class="btn btn-light btn-sm" data-bs-dismiss="modal">Hủy</button>
                        <button type="submit" class="btn btn-primary btn-sm">Xác nhận</button>
                    </div>
                </form>
            </div>
        </div>
    </div>

    <div class="modal fade" id="manageNotePasswordModal" tabindex="-1" aria-hidden="true">
        <div class="modal-dialog modal-dialog-centered modal-sm">
            <div class="modal-content border-0 shadow-lg">
                <div class="modal-header border-bottom">
                    <h5 class="modal-title fs-6 fw-bold">Quản lý mật khẩu ghi chú</h5>
                    <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
                </div>
                <form id="manageNotePasswordForm">
                    <div class="modal-body">
                        <div class="mb-2">
                            <label class="form-label small mb-1">Hành động</label>
                            <select class="form-select form-select-sm" id="passwordActionSelect">
                                <option value="set">Đặt mật khẩu</option>
                                <option value="change">Đổi mật khẩu</option>
                                <option value="disable">Tắt mật khẩu</option>
                            </select>
                        </div>
                        <div class="mb-2 d-none" id="passwordCurrentWrap">
                            <label class="form-label small mb-1">Mật khẩu hiện tại</label>
                            <input type="password" class="form-control form-control-sm" id="passwordCurrentInput">
                        </div>
                        <div class="mb-2" id="passwordNewWrap">
                            <label class="form-label small mb-1">Mật khẩu mới</label>
                            <input type="password" class="form-control form-control-sm" id="passwordNewInput">
                        </div>
                        <div class="mb-2" id="passwordConfirmWrap">
                            <label class="form-label small mb-1">Nhập lại mật khẩu mới</label>
                            <input type="password" class="form-control form-control-sm" id="passwordConfirmInput">
                        </div>
                        <div class="small text-danger mt-2 d-none" id="manageNotePasswordError"></div>
                    </div>
                    <div class="modal-footer border-0">
                        <button type="button" class="btn btn-light btn-sm" data-bs-dismiss="modal">Hủy</button>
                        <button type="submit" class="btn btn-dark btn-sm">Lưu</button>
                    </div>
                </form>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
    <script src="../assets/Script/dashboard.js"></script>
</body>
</html>
