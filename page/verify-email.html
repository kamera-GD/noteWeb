<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Xác thực email</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="../assets/Css/Style.css">
</head>
<body>
    <div class="auth-card">
        <div id="verifyAlert" class="alert d-none mb-3" role="alert"></div>

        <h3 class="text-center mb-3">Xác thực email</h3>
        <p class="text-muted text-center small mb-4">
            Nhập mã <strong>123456</strong> để kích hoạt tài khoản.
        </p>

        <form id="verifyEmailForm">
            <div class="mb-3">
                <label for="verifyCode" class="form-label">Mã xác thực</label>
                <input type="text" class="form-control" id="verifyCode" name="code" maxlength="6" required>
            </div>
            <button type="submit" class="btn btn-primary w-100" id="verifySubmitBtn">Xác thực</button>
            <div class="text-center mt-3">
                <button type="button" id="cancelVerifyBtn" class="btn btn-link text-decoration-none small p-0">Quay lại đăng nhập</button>
            </div>
        </form>
    </div>

    <script src="../assets/Script/verify-email.js"></script>
</body>
</html>
