<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Đặt lại mật khẩu</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="../assets/Css/Style.css">
</head>
<body>
    <div class="auth-card">
        <div id="resetAlert" class="alert d-none mb-3" role="alert"></div>
        <h3 class="text-center mb-3">Đặt lại mật khẩu</h3>
        <p class="text-muted text-center small mb-4">Nhập mật khẩu mới cho tài khoản của bạn.</p>

        <form id="resetPasswordForm">
            <div class="mb-3">
                <label for="newPassword" class="form-label">Mật khẩu mới</label>
                <input type="password" class="form-control" id="newPassword" required>
            </div>
            <div class="mb-3">
                <label for="confirmNewPassword" class="form-label">Nhập lại mật khẩu mới</label>
                <input type="password" class="form-control" id="confirmNewPassword" required>
            </div>
            <button type="submit" class="btn btn-success w-100" id="resetSubmitBtn">Lưu mật khẩu mới</button>
            <div class="text-center mt-3">
                <a href="../index.html" class="text-decoration-none small">Quay lại đăng nhập</a>
            </div>
        </form>
    </div>

    <script src="../assets/Script/reset-password.js"></script>
</body>
</html>
